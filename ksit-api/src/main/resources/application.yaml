# Simple Spring Boot Configuration - Connection Pool Optimized
spring:
  application:
    name: ks_it_school

  profiles:
    active: prod

  # File uploads - No limits
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

  # Optimized Database Configuration
  datasource:
    url: jdbc:postgresql://159.223.34.241:5432/ks_it_school
#    url: jdbc:postgresql://localhost:5432/ks_it_school
    username: postgres
    password: Hour1819
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 20
        order_inserts: true
        order_updates: true

# Server Configuration
server:
  port: 7000

# JWT Configuration
jwt:
  secret:
    key: da2bd42bef8f9f957d647ed13571d35b59c7055fb723eacdb05154878da17d77d3180385fc232cab38bded0fc7dbda0d439cc275e91164ade266d64d50633bc7
  expiration-min: 9999999999999

# Swagger Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui/swagger-ui/index.html
    enabled: true
    url: /v3/api-docs
    config-url: /v3/api-docs/swagger-config
  api-docs:
    path: /v3/api-docs
    enabled: true
  packagesToScan: com.menghor.ksit

# Logging Configuration
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    # Hide debug for your custom app packages
    com.menghor.ksit: INFO


  file:
    name: logs/ks-it-school.log

  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"